# Sincroniza el catálogo .github/labels.yml con el repositorio en GitHub.
name: Labels Sync

on:
  push:
    branches: [main]
    paths:
      - ".github/labels.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sync-labels:
    name: sync-labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Crear o actualizar labels en el repo
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
